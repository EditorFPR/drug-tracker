<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiji Drug Intelligence Hub · Fiji Political Review</title>
<meta name="description" content="Fiji Political Review's drug intelligence tools: a documented chronology and network constellation of Fiji's narcotics trade, 2000–2026.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Cormorant+Garamond:ital,wght@1,500&family=IBM+Plex+Mono:wght@300;400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #1a2332;
  --gold: #d4af64;
  --coral: #e07a5f;
  --cream: #f4f1ee;
  --border: #e2e8f0;
  --blue: #2c5282;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--cream);
  color: var(--ink);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── NAV STRIP ── */
.hub-nav {
  flex-shrink: 0;
  background: var(--ink);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 0;
  height: 52px;
  border-bottom: 1px solid rgba(212,175,100,0.2);
  z-index: 10;
}

.hub-brand {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold);
  opacity: 0.85;
  padding-right: 20px;
  border-right: 1px solid rgba(255,255,255,0.1);
  white-space: nowrap;
}

.hub-tabs {
  display: flex;
  gap: 2px;
  margin-left: 16px;
  flex: 1;
}

.tab-btn {
  font-family: 'Inter', sans-serif;
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 0.5px;
  padding: 7px 18px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  gap: 7px;
  white-space: nowrap;
  background: transparent;
  color: rgba(255,255,255,0.45);
}

.tab-btn:hover {
  color: rgba(255,255,255,0.75);
  background: rgba(255,255,255,0.06);
}

.tab-btn.active {
  background: rgba(212,175,100,0.15);
  color: var(--gold);
  border: 1px solid rgba(212,175,100,0.3);
}

.tab-icon {
  font-size: 0.85rem;
  opacity: 0.9;
}

.tab-sub {
  font-size: 0.6rem;
  opacity: 0.6;
  font-weight: 400;
  letter-spacing: 0;
}

/* divider between tabs and meta */
.hub-meta {
  margin-left: auto;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.58rem;
  color: rgba(255,255,255,0.25);
  letter-spacing: 1px;
  white-space: nowrap;
}

/* ── CONTENT AREA ── */
.hub-content {
  flex: 1;
  position: relative;
  overflow: hidden;
}

.view-pane {
  position: absolute;
  inset: 0;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.view-pane.active {
  opacity: 1;
  pointer-events: all;
}

.view-pane iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}

/* ── LOADING SHIMMER ── */
.pane-loader {
  position: absolute;
  inset: 0;
  background: var(--cream);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 14px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.7rem;
  color: #a0aec0;
  letter-spacing: 2px;
  text-transform: uppercase;
  z-index: 2;
  transition: opacity 0.4s ease;
}

.pane-loader.dark {
  background: #040407;
  color: rgba(212,175,100,0.4);
}

.pane-loader.hidden {
  opacity: 0;
  pointer-events: none;
}

.loader-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
  display: inline-block;
  animation: blink 1.2s infinite ease-in-out;
}
.loader-dot:nth-child(2) { animation-delay: 0.2s; }
.loader-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
  0%, 100% { opacity: 0.2; }
  50% { opacity: 1; }
}

.loader-dots { display: flex; gap: 5px; }

/* ── MOBILE ── */
@media (max-width: 600px) {
  .hub-brand { display: none; }
  .hub-tabs { margin-left: 0; }
  .tab-sub { display: none; }
  .hub-meta { display: none; }
  .tab-btn { padding: 7px 12px; }
}
</style>
</head>
<body>

<nav class="hub-nav">
  <div class="hub-brand">FPR · Drug Intel</div>

  <div class="hub-tabs">
    <button class="tab-btn active" data-target="timeline">
      <span class="tab-icon">📋</span>
      Timeline
      <span class="tab-sub">2000–2026</span>
    </button>
    <button class="tab-btn" data-target="constellation">
      <span class="tab-icon">✦</span>
      Network
      <span class="tab-sub">Constellation</span>
    </button>
  </div>

  <div class="hub-meta">Updated 10 June 2026 · Every entry sourced</div>
</nav>

<div class="hub-content">

  <!-- TIMELINE VIEW -->
  <div class="view-pane active" id="pane-timeline">
    <div class="pane-loader" id="loader-timeline">
      <div class="loader-dots">
        <span class="loader-dot"></span>
        <span class="loader-dot"></span>
        <span class="loader-dot"></span>
      </div>
      Loading timeline
    </div>
    <iframe
      id="frame-timeline"
      src="tracker.html"
      title="Fiji Drug Trade Timeline 2000–2026"
      onload="hideLoader('timeline')"
    ></iframe>
  </div>

  <!-- CONSTELLATION VIEW -->
  <div class="view-pane" id="pane-constellation">
    <div class="pane-loader dark" id="loader-constellation">
      <div class="loader-dots">
        <span class="loader-dot"></span>
        <span class="loader-dot"></span>
        <span class="loader-dot"></span>
      </div>
      Mapping network
    </div>
    <iframe
      id="frame-constellation"
      src=""
      data-src="constellation.html"
      title="Fiji Narcotics Network Constellation"
      onload="hideLoader('constellation')"
    ></iframe>
  </div>

</div>

<script>
function hideLoader(id) {
  const loader = document.getElementById('loader-' + id);
  if (loader) loader.classList.add('hidden');
}

// Lazy-load constellation only when first switched to
let constellationLoaded = false;

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    const target = this.dataset.target;

    // update tabs
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');

    // update panes
    document.querySelectorAll('.view-pane').forEach(p => p.classList.remove('active'));
    document.getElementById('pane-' + target).classList.add('active');

    // lazy-load constellation iframe
    if (target === 'constellation' && !constellationLoaded) {
      const frame = document.getElementById('frame-constellation');
      frame.src = frame.dataset.src;
      constellationLoaded = true;
    }
  });
});
</script>

</body>
</html>
